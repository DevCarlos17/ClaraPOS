# =============================================
# CLARAPOS: PowerSync Sync Rules
# =============================================
# Pegar este contenido en PowerSync Cloud Dashboard > Sync Rules
#
# Arquitectura de buckets:
#   - global: Catalogos de referencia (monedas, tipos persona, etc.)
#   - by_empresa: Datos de negocio filtrados por empresa_id del usuario
#
# El user_id viene del JWT de Supabase (claim "sub")
# =============================================
#
# PREREQUISITO: Publicacion PostgreSQL
# =============================================
# Cada vez que se agregan tablas nuevas a este archivo, tambien hay que
# agregarlas a la publicacion de replicacion logica de Supabase.
# Ejecutar en Supabase Dashboard > SQL Editor:
#
#   ALTER PUBLICATION powersync ADD TABLE "public"."nombre_tabla";
#
# Tablas del modulo de citas (ejecutar si no estan en la publicacion):
#   ALTER PUBLICATION powersync ADD TABLE "public"."citas";
#   ALTER PUBLICATION powersync ADD TABLE "public"."citas_servicios";
#   ALTER PUBLICATION powersync ADD TABLE "public"."horarios_staff";
#   ALTER PUBLICATION powersync ADD TABLE "public"."cita_trabajadores";
#   ALTER PUBLICATION powersync ADD TABLE "public"."cita_log";
#   ALTER PUBLICATION powersync ADD TABLE "public"."cita_items_extras";
#   ALTER PUBLICATION powersync ADD TABLE "public"."horarios_descansos";
#   ALTER PUBLICATION powersync ADD TABLE "public"."horarios_excepciones";
#
# Para verificar que tablas ya estan en la publicacion:
#   SELECT tablename FROM pg_publication_tables WHERE pubname = 'powersync';
# =============================================

bucket_definitions:
  # ==========================================
  # BUCKET GLOBAL: Catalogos compartidos
  # Datos de solo lectura, sin empresa_id
  # ==========================================
  global:
    data:
      - SELECT * FROM monedas
      - SELECT * FROM tipos_persona_ve
      - SELECT * FROM islr_conceptos_ve
      - SELECT * FROM tipos_movimiento
      - SELECT * FROM permisos

  # ==========================================
  # BUCKET POR EMPRESA: Datos de negocio
  # Parametrizado por empresa_id del usuario autenticado
  # ==========================================
  by_empresa:
    parameters: SELECT empresa_id FROM usuarios WHERE id = token_parameters.user_id
    data:
      # --- CORE: Empresa y usuarios ---
      - SELECT * FROM empresas WHERE id = bucket.empresa_id
      - SELECT * FROM empresas_fiscal_ve WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM usuarios WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM roles WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM rol_permisos WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM tenant_permisos WHERE empresa_id = bucket.empresa_id

      # --- CONFIGURACION ---
      - SELECT * FROM tasas_cambio WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM metodos_cobro WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM bancos_empresa WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM cajas WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM impuestos_ve WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM niveles_precio WHERE empresa_id = bucket.empresa_id

      # --- INVENTARIO ---
      - SELECT * FROM departamentos WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM marcas WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM unidades WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM unidades_conversion WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM depositos WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM productos WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM inventario_stock WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM recetas WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM movimientos_inventario WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM ajuste_motivos WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM ajustes WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM ajustes_det WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM lotes WHERE empresa_id = bucket.empresa_id

      # --- CLIENTES / CXC ---
      - SELECT * FROM clientes WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM movimientos_cuenta WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM vencimientos_cobrar WHERE empresa_id = bucket.empresa_id

      # --- VENTAS ---
      - SELECT * FROM ventas WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM ventas_det WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM pagos WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM notas_credito WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM notas_credito_det WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM notas_debito WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM notas_debito_det WHERE empresa_id = bucket.empresa_id

      # --- CAJA / TESORERIA ---
      - SELECT * FROM sesiones_caja WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM sesiones_caja_detalle WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM movimientos_metodo_cobro WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM movimientos_bancarios WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM caja_fuerte WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM mov_caja_fuerte WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM traspasos_tesoreria WHERE empresa_id = bucket.empresa_id

      # --- RETENCIONES VENTAS ---
      - SELECT * FROM retenciones_iva_ventas WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM retenciones_islr_ventas WHERE empresa_id = bucket.empresa_id

      # --- PROVEEDORES / COMPRAS / CXP ---
      - SELECT * FROM proveedores WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM proveedores_bancos WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM facturas_compra WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM facturas_compra_det WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM retenciones_iva WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM retenciones_islr WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM notas_fiscales_compra WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM notas_fiscales_compra_det WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM movimientos_cuenta_proveedor WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM vencimientos_pagar WHERE empresa_id = bucket.empresa_id

      # --- CONTABILIDAD ---
      - SELECT * FROM plan_cuentas WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM gastos WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM gasto_pagos WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM cuentas_config WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM libro_contable WHERE empresa_id = bucket.empresa_id

      # --- AGENDA Y CITAS ---
      - SELECT * FROM citas WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM citas_servicios WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM horarios_staff WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM cita_trabajadores WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM cita_log WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM cita_items_extras WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM horarios_descansos WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM horarios_excepciones WHERE empresa_id = bucket.empresa_id
      - SELECT * FROM horarios_plantillas WHERE empresa_id = bucket.empresa_id
